<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIEMPRE — Profesional</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --violet: #5B3E96;
    --violet-dark: #382461;
    --violet-deep: #241847;
    --violet-light: #EFEAF9;
    --teal: #0F8C68;
    --teal-dark: #0B6E52;
    --teal-light: #E1F5EE;
    --pink: #E85D8A;
    --pink-light: #FCEAF0;
    --gray-900: #221F2B;
    --gray-600: #6E6A78;
    --gray-300: #DEDAE6;
    --gray-100: #F5F3F9;
    --bg: #F7F7FA;
    --radius: 14px;
    --shadow-card: 0 1px 2px rgba(34,24,60,0.04), 0 6px 20px -8px rgba(34,24,60,0.12);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--gray-900); min-height: 100vh; }
  .screen { max-width: 420px; margin: 0 auto; min-height: 100vh; display: none; flex-direction: column; justify-content: center; padding: 32px 24px; }
  .screen.show { display: flex; }
  #dashboard-screen.show { display: block; max-width: 900px; padding: 0; justify-content: flex-start; }

  .logo-mark {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(155deg, #7C5CC4 0%, var(--violet) 45%, var(--violet-deep) 100%);
    display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
    font-family: 'Fraunces', serif; font-size: 22px; margin: 0 auto 18px; box-shadow: var(--shadow-card);
  }
  h1.brand { text-align: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; color: var(--violet-deep); margin: 0 0 4px; }
  p.tagline { text-align: center; color: var(--gray-600); font-size: 13px; margin: 0 0 28px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 6px; }
  input[type="text"], input[type="email"], input[type="password"], select {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-300); border-radius: 10px;
    font-size: 15px; margin-bottom: 14px; background: white; font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--violet); }
  button.primary {
    width: 100%; padding: 13px; background: linear-gradient(135deg, var(--violet), var(--violet-deep));
    color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    font-family: 'Manrope', sans-serif; cursor: pointer;
  }
  button.primary:disabled { opacity: 0.6; }
  button.link-btn {
    display: block; width: 100%; text-align: center; background: none; border: none; color: var(--violet);
    font-size: 13px; font-weight: 600; margin-top: 14px; cursor: pointer;
  }
  .msg-error { color: #B23B32; background: #FBEAE8; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
  .msg-info { color: var(--teal-dark); background: var(--teal-light); padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }

  header.top-bar {
    background: linear-gradient(135deg, var(--violet), var(--violet-deep)); color: white;
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  header.top-bar .titulo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  header.top-bar .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  header.top-bar button { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: pointer; }

  main.dash-main { padding: 24px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-card); border: 1px solid var(--gray-300); }
  .stat-card .num { font-family: 'Manrope', sans-serif; font-size: 30px; font-weight: 800; color: var(--violet-dark); }
  .stat-card .label { font-size: 12.5px; color: var(--gray-600); font-weight: 600; margin-top: 4px; }

  .inst-table { width: 100%; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--gray-300); border-collapse: collapse; }
  .inst-table th { background: var(--gray-100); text-align: left; padding: 10px 16px; font-size: 12px; color: var(--gray-600); font-weight: 700; }
  .inst-table td { padding: 12px 16px; font-size: 13.5px; border-top: 1px solid var(--gray-100); }
  .section-title { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 15px; color: var(--gray-900); margin: 0 0 12px; }
</style>
</head>
<body>

<div class="screen" id="login-screen">
  <div class="logo-mark">S</div>
  <h1 class="brand">SIEMPRE</h1>
  <p class="tagline">Acceso profesional</p>
  <div class="msg-error" id="login-error"></div>
  <form id="login-form">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" required>
    <label for="login-password">Contraseña</label>
    <input type="password" id="login-password" required>
    <button type="submit" class="primary" id="login-btn">Ingresar</button>
  </form>
  <button class="link-btn" id="ir-a-registro-btn">¿No tenés cuenta? Creá una</button>
</div>

<div class="screen" id="signup-screen">
  <div class="logo-mark">S</div>
  <h1 class="brand">Crear cuenta</h1>
  <p class="tagline">Acceso profesional</p>
  <div class="msg-error" id="signup-error"></div>
  <div class="msg-info" id="signup-info"></div>
  <form id="signup-form">
    <label for="signup-email">Email</label>
    <input type="email" id="signup-email" required>
    <label for="signup-password">Contraseña</label>
    <input type="password" id="signup-password" required minlength="6">
    <button type="submit" class="primary" id="signup-btn">Crear cuenta</button>
  </form>
  <button class="link-btn" id="ir-a-login-btn">Ya tengo cuenta</button>
</div>

<div class="screen" id="perfil-screen">
  <div class="logo-mark">S</div>
  <h1 class="brand">Completá tu perfil</h1>
  <p class="tagline">Últimos datos antes de entrar</p>
  <div class="msg-error" id="perfil-error"></div>
  <form id="perfil-form">
    <label for="perfil-nombre">Nombre completo</label>
    <input type="text" id="perfil-nombre" required>
    <label for="perfil-matricula">Matrícula (opcional)</label>
    <input type="text" id="perfil-matricula">
    <label for="perfil-institucion">Institución</label>
    <select id="perfil-institucion"><option value="">Cargando...</option></select>
    <button type="submit" class="primary" id="perfil-btn">Continuar</button>
  </form>
</div>

<div class="screen" id="dashboard-screen">
  <header class="top-bar">
    <div>
      <div class="titulo" id="dash-nombre">—</div>
      <div class="sub" id="dash-institucion">—</div>
    </div>
    <button id="logout-btn">Cerrar sesión</button>
  </header>
  <main class="dash-main">
    <div class="stat-grid" id="dash-stats"></div>
    <div id="dash-instituciones-wrap"></div>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://bvxeiihvlczztuvjgzyz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2eGVpaWh2bGN6enR1dmpnenl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTUwNTksImV4cCI6MjA5OTI3MTA1OX0.xjf75zfJIgxTWSzJ8UMtnq1XNk7yMfbCijgUdIkxhCQ";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function mostrarPantalla(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
    document.getElementById(id).classList.add("show");
  }

  // ---------- LOGIN ----------
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("login-error");
    errorBox.style.display = "none";
    const btn = document.getElementById("login-btn");
    btn.disabled = true; btn.textContent = "Ingresando...";

    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById("login-email").value.trim(),
      password: document.getElementById("login-password").value
    });

    btn.disabled = false; btn.textContent = "Ingresar";
    if (error) {
      errorBox.textContent = "Email o contraseña incorrectos.";
      errorBox.style.display = "block";
      return;
    }
    await despuesDeLogin();
  });

  document.getElementById("ir-a-registro-btn").addEventListener("click", () => mostrarPantalla("signup-screen"));
  document.getElementById("ir-a-login-btn").addEventListener("click", () => mostrarPantalla("login-screen"));

  // ---------- SIGNUP ----------
  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("signup-error");
    const infoBox = document.getElementById("signup-info");
    errorBox.style.display = "none";
    infoBox.style.display = "none";
    const btn = document.getElementById("signup-btn");
    btn.disabled = true; btn.textContent = "Creando cuenta...";

    const { data, error } = await sb.auth.signUp({
      email: document.getElementById("signup-email").value.trim(),
      password: document.getElementById("signup-password").value
    });

    btn.disabled = false; btn.textContent = "Crear cuenta";
    if (error) {
      errorBox.textContent = error.message || "No pudimos crear la cuenta.";
      errorBox.style.display = "block";
      return;
    }

    if (!data.session) {
      infoBox.textContent = "Te enviamos un email para confirmar tu cuenta. Confirmalo y después iniciá sesión.";
      infoBox.style.display = "block";
      return;
    }
    await despuesDeLogin();
  });

  // ---------- Flujo post-login: ¿ya completó su perfil? ----------
  async function despuesDeLogin() {
    const { data, error } = await sb.rpc("obtener_mi_perfil_profesional");
    if (error || !data || !data.ok) {
      mostrarPantalla("login-screen");
      return;
    }
    if (!data.registrado) {
      await cargarInstitucionesEnSelect();
      mostrarPantalla("perfil-screen");
      return;
    }
    mostrarDashboard(data);
  }

  async function cargarInstitucionesEnSelect() {
    const { data } = await sb.rpc("obtener_instituciones_lista");
    const select = document.getElementById("perfil-institucion");
    select.innerHTML = (data || []).map(i => `<option value="${i.id}">${i.nombre}</option>`).join("") || `<option value="">No hay instituciones cargadas</option>`;
  }

  document.getElementById("perfil-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("perfil-error");
    errorBox.style.display = "none";
    const institucionId = document.getElementById("perfil-institucion").value;
    if (!institucionId) { errorBox.textContent = "Elegí una institución."; errorBox.style.display = "block"; return; }

    const btn = document.getElementById("perfil-btn");
    btn.disabled = true; btn.textContent = "Guardando...";
    const { data, error } = await sb.rpc("completar_registro_profesional", {
      p_nombre: document.getElementById("perfil-nombre").value.trim(),
      p_matricula: document.getElementById("perfil-matricula").value.trim(),
      p_institucion_id: institucionId
    });
    btn.disabled = false; btn.textContent = "Continuar";

    if (error || !data || !data.ok) {
      errorBox.textContent = "No pudimos guardar tu perfil. Probá de nuevo.";
      errorBox.style.display = "block";
      return;
    }
    const perfil = await sb.rpc("obtener_mi_perfil_profesional");
    mostrarDashboard(perfil.data);
  });

  // ---------- Dashboard ----------
  async function mostrarDashboard(perfil) {
    document.getElementById("dash-nombre").textContent = perfil.nombre || "Profesional";
    document.getElementById("dash-institucion").textContent = perfil.es_super_admin
      ? "Acceso a todas las instituciones"
      : (perfil.institucion_nombre || "");
    mostrarPantalla("dashboard-screen");

    const { data, error } = await sb.rpc("obtener_dashboard");
    if (error || !data || !data.ok) return;

    document.getElementById("dash-stats").innerHTML = `
      <div class="stat-card"><div class="num">${data.total_pacientes}</div><div class="label">Pacientes totales</div></div>
      <div class="stat-card"><div class="num">${data.activas}</div><div class="label">Pacientes activas</div></div>
    `;

    const wrap = document.getElementById("dash-instituciones-wrap");
    if (data.es_super_admin && data.instituciones) {
      wrap.innerHTML = `<h2 class="section-title">Por institución</h2>
        <table class="inst-table">
          <thead><tr><th>Institución</th><th>Total</th><th>Activas</th></tr></thead>
          <tbody>${data.instituciones.map(i => `<tr><td>${i.nombre}</td><td>${i.total}</td><td>${i.activas}</td></tr>`).join("")}</tbody>
        </table>`;
    } else {
      wrap.innerHTML = "";
    }
  }

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await sb.auth.signOut();
    mostrarPantalla("login-screen");
  });

  // ---------- Arranque: ¿ya hay sesión activa? ----------
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      await despuesDeLogin();
    } else {
      mostrarPantalla("login-screen");
    }
  })();
</script>

</body>
</html>
