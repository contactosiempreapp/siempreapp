<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIEMPRE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --violet: #5B3E96;
    --violet-dark: #3E2A69;
    --violet-light: #EFEAF9;
    --pink: #E85D8A;
    --pink-light: #FCEAF0;
    --teal: #0F8C68;
    --teal-light: #E1F5EE;
    --gray-900: #2B2B2E;
    --gray-600: #6B6A70;
    --gray-300: #DAD8E0;
    --gray-100: #F5F4F8;
    --bg: #FBFAFD;
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--gray-900);
    min-height: 100vh;
  }
  .screen {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- LOGIN ---------- */
  #login-screen {
    justify-content: center;
    padding: 32px 24px;
  }
  .logo-mark {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--violet), var(--violet-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 22px;
    margin: 0 auto 20px;
  }
  h1.brand {
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    color: var(--violet-dark);
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  p.tagline {
    text-align: center;
    color: var(--gray-600);
    font-size: 14px;
    margin: 0 0 32px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-900);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 18px;
    background: white;
  }
  input:focus {
    outline: none;
    border-color: var(--violet);
  }
  button.primary {
    width: 100%;
    padding: 14px;
    background: var(--violet);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:active { background: var(--violet-dark); }
  button.primary:disabled { opacity: 0.6; }
  #login-error {
    color: var(--pink);
    background: var(--pink-light);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  /* ---------- HOME ---------- */
  #home-screen { display: none; }
  header.top {
    background: var(--violet);
    color: white;
    padding: 20px 20px 24px;
    border-radius: 0 0 24px 24px;
  }
  header.top .greeting { font-size: 13px; opacity: 0.8; }
  header.top .name { font-size: 20px; font-weight: 700; margin-top: 2px; }

  main { padding: 20px; flex: 1; }

  .card {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
    border: 1px solid var(--gray-300);
  }
  .card h2 {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pill-teal {
    background: var(--teal-light);
    color: var(--teal);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-dow {
    font-size: 11px;
    color: var(--gray-600);
    text-align: center;
    font-weight: 600;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--gray-300);
    background: white;
    color: var(--gray-900);
    user-select: none;
  }
  .cal-day.empty { visibility: hidden; cursor: default; }
  .cal-day.tomada { background: var(--teal); border-color: var(--teal); color: white; font-weight: 700; }
  .cal-day.no-tomada { background: var(--pink-light); border-color: var(--pink); color: var(--pink); font-weight: 700; }
  .cal-day.today { box-shadow: 0 0 0 2px var(--violet); }

  .legend { display: flex; gap: 14px; margin-top: 12px; font-size: 12px; color: var(--gray-600); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  button.logout {
    background: none;
    border: none;
    color: var(--gray-600);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
  footer.foot { text-align: center; padding: 12px; }
</style>
</head>
<body>

<div class="screen" id="login-screen">
  <div class="logo-mark">S</div>
  <h1 class="brand">SIEMPRE</h1>
  <p class="tagline">Seguimiento integral del embarazo, maternidad, prevención de riesgo y evolución</p>

  <div id="login-error"></div>

  <form id="login-form">
    <label for="dni">Documento (DNI)</label>
    <input type="text" id="dni" inputmode="numeric" placeholder="Sin puntos, sin espacios" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" required>

    <button type="submit" class="primary" id="login-btn">Ingresar</button>
  </form>
</div>

<div class="screen" id="home-screen">
  <header class="top">
    <div class="greeting">Hola,</div>
    <div class="name" id="patient-name">—</div>
  </header>

  <main>
    <div class="card" id="aspirina-card">
      <h2>Aspirina <span class="pill-teal" id="aspirina-mes-label">—</span></h2>
      <div class="cal-grid" id="cal-dow-row"></div>
      <div class="cal-grid" id="cal-grid" style="margin-top:6px;"></div>
      <div class="legend">
        <span><span class="dot" style="background:var(--teal)"></span> Tomada</span>
        <span><span class="dot" style="background:var(--pink)"></span> No tomada</span>
        <span><span class="dot" style="background:white;border:1.5px solid var(--gray-300)"></span> Sin registrar</span>
      </div>
    </div>
  </main>

  <footer class="foot">
    <button class="logout" id="logout-btn">Cerrar sesión</button>
  </footer>
</div>

<script>
  // --- Configuración de conexión a Supabase ---
  const SUPABASE_URL = "https://bvxeiihvlczztuvjgzyz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2eGVpaWh2bGN6enR1dmpnenl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTUwNTksImV4cCI6MjA5OTI3MTA1OX0.xjf75zfJIgxTWSzJ8UMtnq1XNk7yMfbCijgUdIkxhCQ";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginScreen = document.getElementById("login-screen");
  const homeScreen = document.getElementById("home-screen");
  const loginForm = document.getElementById("login-form");
  const loginError = document.getElementById("login-error");
  const loginBtn = document.getElementById("login-btn");

  // Sesión guardada en este dispositivo (no es dato sensible en sí,
  // es solo el token de sesión — igual que cualquier app que te
  // mantiene logueada).
  let session = JSON.parse(localStorage.getItem("siempre_session") || "null");

  function showHome(data) {
    document.getElementById("patient-name").textContent = data.nombre + " " + data.apellido;
    loginScreen.style.display = "none";
    homeScreen.style.display = "flex";
    homeScreen.style.flexDirection = "column";
    loadAspirinaCalendar();
  }

  async function doLogin(dni, password) {
    loginError.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.textContent = "Ingresando...";

    const { data, error } = await sb.rpc("login_paciente", { p_dni: dni, p_password: password });

    loginBtn.disabled = false;
    loginBtn.textContent = "Ingresar";

    if (error) {
      loginError.textContent = "No pudimos conectar. Probá de nuevo en un momento.";
      loginError.style.display = "block";
      return;
    }
    if (!data.ok) {
      loginError.textContent = data.error === "DNI no encontrado"
        ? "No encontramos ese documento. Verificalo con tu médica."
        : "Contraseña incorrecta.";
      loginError.style.display = "block";
      return;
    }

    session = data;
    localStorage.setItem("siempre_session", JSON.stringify(session));
    showHome(session);
  }

  loginForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const dni = document.getElementById("dni").value.trim();
    const password = document.getElementById("password").value;
    doLogin(dni, password);
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    localStorage.removeItem("siempre_session");
    session = null;
    homeScreen.style.display = "none";
    loginScreen.style.display = "flex";
    loginForm.reset();
  });

  // --- Calendario de aspirina ---
  const DOW = ["D", "L", "M", "M", "J", "V", "S"];
  const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

  async function loadAspirinaCalendar() {
    const hoy = new Date();
    const anio = hoy.getFullYear();
    const mes = hoy.getMonth() + 1;

    document.getElementById("aspirina-mes-label").textContent = MESES[mes - 1] + " " + anio;

    const dowRow = document.getElementById("cal-dow-row");
    dowRow.innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join("");

    const { data, error } = await sb.rpc("obtener_calendario_aspirina", {
      p_token: session.token, p_anio: anio, p_mes: mes
    });

    const registros = {};
    if (!error && data && data.ok) {
      data.registros.forEach(r => { registros[r.dia.slice(8, 10)] = r.tomada; });
    }

    const primerDia = new Date(anio, mes - 1, 1).getDay();
    const diasEnMes = new Date(anio, mes, 0).getDate();
    const grid = document.getElementById("cal-grid");
    grid.innerHTML = "";

    for (let i = 0; i < primerDia; i++) {
      grid.innerHTML += `<div class="cal-day empty"></div>`;
    }

    for (let d = 1; d <= diasEnMes; d++) {
      const dd = String(d).padStart(2, "0");
      const isToday = d === hoy.getDate();
      let cls = "cal-day";
      if (isToday) cls += " today";
      if (registros[dd] === true) cls += " tomada";
      else if (registros[dd] === false) cls += " no-tomada";
      grid.innerHTML += `<div class="${cls}" data-day="${dd}">${d}</div>`;
    }

    grid.querySelectorAll(".cal-day:not(.empty)").forEach(el => {
      el.addEventListener("click", () => toggleAspirina(el, anio, mes));
    });
  }

  async function toggleAspirina(el, anio, mes) {
    const dd = el.dataset.day;
    const yaEstaTomada = el.classList.contains("tomada");
    const nuevoValor = !yaEstaTomada;
    const fecha = `${anio}-${String(mes).padStart(2, "0")}-${dd}`;

    el.classList.remove("tomada", "no-tomada");
    el.classList.add(nuevoValor ? "tomada" : "no-tomada");

    await sb.rpc("registrar_aspirina", { p_token: session.token, p_dia: fecha, p_tomada: nuevoValor });
  }

  // Si ya había sesión guardada, entrar directo
  if (session && session.token) {
    showHome(session);
  }
</script>

</body>
</html>
